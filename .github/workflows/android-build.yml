name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Patch expo-clipboard for Gradle compatibility
        run: |
          python3 - <<'EOF'
          f = 'node_modules/expo-clipboard/android/build.gradle'
          content = open(f).read()
          old = '    useExpoPublishing()\n    useCoreDependencies()'
          new = '    useDefaultAndroidSdkVersions()\n    useExpoPublishing()\n    useCoreDependencies()'
          if old in content:
              with open(f, 'w') as fh:
                  fh.write(content.replace(old, new))
              print('Patched expo-clipboard/android/build.gradle: added useDefaultAndroidSdkVersions()')
          else:
              print('expo-clipboard/android/build.gradle: pattern not found, skipping patch')
          EOF

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Pin Gradle wrapper to 8.6 for expo-modules compatibility
        run: |
          sed -i 's|distributions/gradle-.*-all\.zip|distributions/gradle-8.6-all.zip|g' \
            android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Remove sensitive files
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/release.keystore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jambgenius-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
