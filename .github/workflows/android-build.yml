name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Patch expo-clipboard for Gradle compatibility
        run: |
          python3 - <<'EOF'
          f = 'node_modules/expo-clipboard/android/build.gradle'
          content = open(f).read()
          old = '    useExpoPublishing()\n    useCoreDependencies()'
          new = '    useDefaultAndroidSdkVersions()\n    useExpoPublishing()\n    useCoreDependencies()'
          if old in content:
              with open(f, 'w') as fh:
                  fh.write(content.replace(old, new))
              print('Patched expo-clipboard/android/build.gradle: added useDefaultAndroidSdkVersions()')
          else:
              print('expo-clipboard/android/build.gradle: pattern not found, skipping patch')
          EOF

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Pin Gradle wrapper to 8.6 for expo-modules compatibility
        run: |
          sed -i 's|distributions/gradle-.*-all\.zip|distributions/gradle-8.6-all.zip|g' \
            android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl android/gradle/wrapper/gradle-wrapper.properties

      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Decode keystore
        run: |
          # Strip carriage returns to handle base64 encoded on Windows, then decode
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r' | base64 --decode > android/app/release.keystore
          # Validate that the decoded file is non-empty; a 0-byte file means
          # KEYSTORE_BASE64 is unset/empty, which causes keytool to throw EOFException.
          if [ ! -s android/app/release.keystore ]; then
            echo "Error: release.keystore is empty after decoding." >&2
            echo "Ensure the KEYSTORE_BASE64 repository secret is set and contains a valid base64-encoded keystore." >&2
            exit 1
          fi
          echo "Keystore decoded successfully ($(wc -c < android/app/release.keystore) bytes)"

      - name: Convert keystore to PKCS12 for Java 17 compatibility
        run: |
          # Java 17 restricts legacy key-protection algorithms (e.g. PBEWithMD5AndDES)
          # used by older JKS keystores, causing UnrecoverableKeyException: null.
          # Re-encoding as PKCS12 uses modern AES-256 key protection that Java 17 supports.
          # -srcstoretype is intentionally omitted so keytool auto-detects JKS or PKCS12.
          keytool -importkeystore \
            -srckeystore android/app/release.keystore \
            -srcstorepass "${{ secrets.STORE_PASSWORD }}" \
            -destkeystore android/app/release.keystore.pkcs12 \
            -deststoretype PKCS12 \
            -deststorepass "${{ secrets.STORE_PASSWORD }}" \
            -destkeypass "${{ secrets.KEY_PASSWORD }}" \
            -noprompt
          if [ ! -f android/app/release.keystore.pkcs12 ]; then
            echo "Error: PKCS12 keystore was not created by keytool" >&2
            exit 1
          fi
          mv android/app/release.keystore.pkcs12 android/app/release.keystore

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Remove sensitive files
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/release.keystore
          rm -f android/app/release.keystore.pkcs12

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jambgenius-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
